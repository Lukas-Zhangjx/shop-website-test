<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品详情 · 一品翠坊</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .detail-wrap {
    margin-top: 70px;
    padding: 80px 60px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .breadcrumb {
    font-size: 0.8rem;
    color: var(--text-mid);
    letter-spacing: 1px;
    margin-bottom: 40px;
  }

  .breadcrumb a { color: var(--gold); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }

  /* 图片区 */
  .detail-img {
    width: 100%;
    aspect-ratio: 1;
    background: var(--cream-dark);
    position: relative;
    overflow: hidden;
  }

  .detail-img img { width: 100%; height: 100%; object-fit: cover; }

  .detail-img-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 6rem; opacity: 0.2;
  }

  /* 信息区 */
  .detail-info { padding-top: 16px; }

  .detail-category {
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 16px;
    display: block;
  }

  .detail-name {
    font-size: 2rem;
    font-weight: normal;
    letter-spacing: 4px;
    color: var(--green-dark);
    margin-bottom: 24px;
    line-height: 1.4;
  }

  .detail-divider {
    width: 40px; height: 1px;
    background: var(--gold);
    margin-bottom: 24px;
  }

  .detail-price {
    font-size: 2.2rem;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .detail-price-note {
    font-size: 0.8rem;
    color: var(--text-mid);
    letter-spacing: 1px;
    margin-bottom: 32px;
  }

  .detail-desc {
    font-size: 0.9rem;
    line-height: 2;
    color: var(--text-mid);
    letter-spacing: 1px;
    margin-bottom: 40px;
    padding: 24px;
    border: 1px solid rgba(201,168,76,0.2);
    background: rgba(201,168,76,0.03);
  }

  .detail-meta {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
  }

  .detail-meta-item {
    display: flex;
    font-size: 0.85rem;
    letter-spacing: 1px;
  }

  .detail-meta-label {
    color: var(--text-mid);
    width: 80px;
    flex-shrink: 0;
  }

  .detail-meta-value { color: var(--green-dark); }

  .detail-actions { display: flex; gap: 16px; }

  .btn-enquiry {
    flex: 1;
    padding: 16px;
    background: var(--green-dark);
    color: var(--gold);
    border: none;
    font-size: 1rem;
    letter-spacing: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
    text-decoration: none;
    text-align: center;
    display: block;
  }

  .btn-enquiry:hover { background: var(--gold); color: var(--green-dark); }

  .btn-back {
    padding: 16px 24px;
    border: 1px solid var(--green-dark);
    color: var(--green-dark);
    background: transparent;
    font-size: 0.9rem;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
    text-decoration: none;
    display: flex;
    align-items: center;
  }

  .btn-back:hover { background: var(--green-dark); color: var(--cream); }

  @media (max-width: 768px) {
    .detail-wrap { padding: 80px 24px 40px; }
    .detail-grid { grid-template-columns: 1fr; gap: 32px; }
  }
</style>
</head>
<body>

<!-- 导航 -->
<nav>
  <a href="../index.html" class="logo">
    一品翠坊
    <span>YIPIN CUIFANG · EST. 2008</span>
  </a>
  <ul>
    <li><a href="../index.html?category=gold">黄金系列</a></li>
    <li><a href="../index.html?category=silver">白银系列</a></li>
    <li><a href="../index.html?category=jade">翡翠玉石</a></li>
    <li><a href="../index.html#story">关于我们</a></li>
  </ul>
  <a href="tel:13800000000" class="nav-contact">联系我们</a>
</nav>

<div class="detail-wrap" style="margin-top: 70px; padding-top: 40px;">
  <!-- 面包屑 -->
  <div class="breadcrumb" id="breadcrumb">
    <a href="../index.html">首页</a> / <span id="breadcrumbCategory">商品</span> / <span id="breadcrumbName">加载中...</span>
  </div>

  <!-- 详情内容 -->
  <div id="detailContent">
    <div class="loading">加载中...</div>
  </div>
</div>

<!-- 底部 -->
<footer>
  <span class="footer-logo">一品翠坊</span>
  <div class="footer-info">
    <div class="footer-info-item">
      <span class="footer-info-label">地址</span>
      <span>珠宝街88号一品翠坊旗舰店</span>
    </div>
    <div class="footer-info-item">
      <span class="footer-info-label">电话</span>
      <span>138-0000-0000</span>
    </div>
    <div class="footer-info-item">
      <span class="footer-info-label">营业时间</span>
      <span>每日 09:00 — 20:00</span>
    </div>
  </div>
  <div class="footer-divider"></div>
  <div class="footer-copy">© 2024 一品翠坊 · 版权所有</div>
</footer>

<!-- AI客服 -->
<button class="ai-btn" onclick="toggleChat()">💬</button>
<div class="ai-chat" id="aiChat">
  <div class="ai-chat-header">
    <div class="ai-avatar">✦</div>
    <div>
      <div class="ai-name">翠坊智能客服</div>
      <div class="ai-status">在线 · 随时为您服务</div>
    </div>
  </div>
  <div class="ai-messages" id="aiMessages">
    <div class="msg msg-ai">您好！欢迎光临一品翠坊 ✨<br>有任何问题随时告诉我！</div>
  </div>
  <div class="ai-input-area">
    <input class="ai-input" id="aiInput" placeholder="输入您的问题..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="ai-send" onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
  const API_BASE = 'http://localhost:3000/api';

  const CATEGORY_MAP = {
    gold: { name: '黄金系列', icon: '✦' },
    silver: { name: '白银系列', icon: '◈' },
    jade: { name: '翡翠玉石', icon: '❋' },
  };

  async function loadProduct() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) { window.location.href = '../index.html'; return; }

    try {
      const res = await fetch(`${API_BASE}/products/${id}`);
      if (!res.ok) throw new Error('商品不存在');
      const product = await res.json();
      renderProduct(product);
    } catch (err) {
      document.getElementById('detailContent').innerHTML =
        '<div class="empty">商品不存在或已下架</div>';
    }
  }

  function renderProduct(product) {
    const category = CATEGORY_MAP[product.category] || { name: product.category, icon: '✦' };
    const imageHtml = product.image_path
      ? `<img src="${API_BASE.replace('/api', '')}${product.image_path}" alt="${product.name}">`
      : `<div class="detail-img-placeholder">${category.icon}</div>`;

    document.getElementById('breadcrumbCategory').textContent = category.name;
    document.getElementById('breadcrumbName').textContent = product.name;
    document.title = `${product.name} · 一品翠坊`;

    document.getElementById('detailContent').innerHTML = `
      <div class="detail-grid">
        <div class="detail-img">${imageHtml}</div>
        <div class="detail-info">
          <span class="detail-category">${category.name}</span>
          <h1 class="detail-name">${product.name}</h1>
          <div class="detail-divider"></div>
          <div class="detail-price">¥ ${Number(product.price).toLocaleString()}</div>
          <div class="detail-price-note">价格仅供参考，以当日报价为准</div>
          <div class="detail-desc">${product.description || '暂无描述'}</div>
          <div class="detail-meta">
            <div class="detail-meta-item">
              <span class="detail-meta-label">分类</span>
              <span class="detail-meta-value">${category.name}</span>
            </div>
            <div class="detail-meta-item">
              <span class="detail-meta-label">库存</span>
              <span class="detail-meta-value">${product.stock > 0 ? `${product.stock} 件` : '暂时缺货'}</span>
            </div>
          </div>
          <div class="detail-actions">
            <a href="tel:13800000000" class="btn-enquiry">立即询价</a>
            <a href="../index.html" class="btn-back">← 返回</a>
          </div>
        </div>
      </div>
    `;
  }

  // AI 客服
  function toggleChat() { document.getElementById('aiChat').classList.toggle('open'); }

  function sendMsg() {
    const input = document.getElementById('aiInput');
    const text = input.value.trim();
    if (!text) return;
    const messages = document.getElementById('aiMessages');
    const userDiv = document.createElement('div');
    userDiv.className = 'msg msg-user';
    userDiv.textContent = text;
    messages.appendChild(userDiv);
    input.value = '';
    messages.scrollTop = messages.scrollHeight;
    setTimeout(() => {
      const aiDiv = document.createElement('div');
      aiDiv.className = 'msg msg-ai';
      aiDiv.textContent = '感谢询问！请拨打 138-0000-0000 或直接来店，我们将为您详细介绍。';
      messages.appendChild(aiDiv);
      messages.scrollTop = messages.scrollHeight;
    }, 600);
  }

  document.addEventListener('DOMContentLoaded', loadProduct);
</script>
</body>
</html>
