<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>后台管理 · 一品翠坊</title>
<style>
  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d5a3d;
    --gold: #c9a84c;
    --cream: #f5f0e8;
    --text-dark: #1a1a1a;
    --text-mid: #4a4a4a;
    --danger: #c0392b;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, 'PingFang SC', sans-serif; background: #f0f2f5; color: var(--text-dark); }

  /* ===== 登录页 ===== */
  .login-page {
    min-height: 100vh;
    background: linear-gradient(135deg, #0d2118, #1a3a2a);
    display: flex; align-items: center; justify-content: center;
  }

  .login-box {
    background: white;
    padding: 48px 40px;
    width: 360px;
  }

  .login-logo {
    text-align: center;
    font-family: 'Georgia', serif;
    font-size: 1.6rem;
    color: var(--green-dark);
    letter-spacing: 4px;
    margin-bottom: 8px;
  }

  .login-sub {
    text-align: center;
    font-size: 0.75rem;
    color: #999;
    letter-spacing: 2px;
    margin-bottom: 40px;
  }

  .form-group { margin-bottom: 20px; }
  .form-label { display: block; font-size: 0.8rem; color: var(--text-mid); margin-bottom: 8px; letter-spacing: 1px; }

  .form-input {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #ddd;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    transition: border-color 0.3s;
  }

  .form-input:focus { border-color: var(--gold); }

  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--green-dark);
    color: var(--gold);
    border: none;
    font-size: 0.95rem;
    letter-spacing: 3px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.3s;
    margin-top: 8px;
  }

  .btn-login:hover { background: var(--gold); color: var(--green-dark); }

  .login-error { color: var(--danger); font-size: 0.8rem; margin-top: 12px; text-align: center; display: none; }

  /* ===== 后台主界面 ===== */
  .admin-page { display: none; }

  .admin-header {
    background: var(--green-dark);
    padding: 0 32px;
    height: 60px;
    display: flex; align-items: center; justify-content: space-between;
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  }

  .admin-logo { color: var(--gold); font-family: 'Georgia', serif; font-size: 1.2rem; letter-spacing: 3px; }
  .admin-logo span { font-size: 0.65rem; color: rgba(201,168,76,0.6); display: block; letter-spacing: 2px; }

  .btn-logout {
    padding: 6px 20px;
    border: 1px solid rgba(201,168,76,0.4);
    color: rgba(201,168,76,0.8);
    background: transparent;
    cursor: pointer;
    font-size: 0.8rem;
    letter-spacing: 1px;
    font-family: inherit;
    transition: all 0.3s;
  }

  .btn-logout:hover { border-color: var(--gold); color: var(--gold); }

  .admin-main { margin-top: 60px; padding: 32px; }

  /* ===== 操作栏 ===== */
  .toolbar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 24px;
  }

  .toolbar-title { font-size: 1.2rem; color: var(--green-dark); letter-spacing: 2px; }

  .btn-add {
    padding: 10px 24px;
    background: var(--green-dark);
    color: var(--gold);
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    letter-spacing: 2px;
    font-family: inherit;
    transition: all 0.3s;
  }

  .btn-add:hover { background: var(--gold); color: var(--green-dark); }

  /* ===== 商品表格 ===== */
  .table-wrap { background: white; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  table { width: 100%; border-collapse: collapse; }
  thead { background: var(--green-dark); }
  thead th { color: var(--gold); padding: 14px 16px; text-align: left; font-size: 0.8rem; letter-spacing: 2px; font-weight: normal; }

  tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.2s; }
  tbody tr:hover { background: #fafaf8; }
  tbody td { padding: 14px 16px; font-size: 0.9rem; }

  .td-img {
    width: 60px; height: 60px;
    object-fit: cover;
    background: var(--cream);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.5rem;
  }

  .td-img img { width: 60px; height: 60px; object-fit: cover; }

  .badge {
    display: inline-block;
    padding: 3px 10px;
    font-size: 0.7rem;
    letter-spacing: 1px;
  }

  .badge-gold { background: rgba(201,168,76,0.15); color: #8B6914; }
  .badge-silver { background: rgba(154,171,181,0.2); color: #4a6070; }
  .badge-jade { background: rgba(45,138,90,0.15); color: #1a5c3a; }
  .badge-active { background: rgba(39,174,96,0.15); color: #1e8449; }
  .badge-inactive { background: rgba(192,57,43,0.1); color: var(--danger); }

  .btn-edit, .btn-delete, .btn-toggle {
    padding: 5px 12px;
    border: none;
    cursor: pointer;
    font-size: 0.75rem;
    letter-spacing: 1px;
    font-family: inherit;
    margin-right: 6px;
    transition: all 0.2s;
  }

  .btn-edit { background: var(--green-dark); color: white; }
  .btn-edit:hover { background: var(--green-mid); }
  .btn-toggle { background: #e8a000; color: white; }
  .btn-toggle:hover { opacity: 0.85; }
  .btn-delete { background: var(--danger); color: white; }
  .btn-delete:hover { opacity: 0.85; }

  /* ===== 弹窗 ===== */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 200;
    display: none; align-items: center; justify-content: center;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: white;
    width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    padding: 40px;
  }

  .modal-title {
    font-size: 1.1rem;
    color: var(--green-dark);
    letter-spacing: 3px;
    margin-bottom: 32px;
    padding-bottom: 16px;
    border-bottom: 1px solid rgba(201,168,76,0.2);
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  .form-select {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #ddd;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    background: white;
    cursor: pointer;
  }

  .form-select:focus { border-color: var(--gold); }

  .form-textarea {
    width: 100%;
    padding: 12px 16px;
    border: 1px solid #ddd;
    font-size: 0.95rem;
    font-family: inherit;
    outline: none;
    resize: vertical;
    min-height: 80px;
  }

  .form-textarea:focus { border-color: var(--gold); }

  .img-preview {
    width: 100%; height: 160px;
    border: 2px dashed #ddd;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: border-color 0.3s;
    overflow: hidden; position: relative;
  }

  .img-preview:hover { border-color: var(--gold); }
  .img-preview img { width: 100%; height: 100%; object-fit: cover; }
  .img-preview-text { font-size: 0.85rem; color: #aaa; letter-spacing: 1px; text-align: center; }

  .modal-actions { display: flex; gap: 12px; margin-top: 32px; }

  .btn-save {
    flex: 1; padding: 14px;
    background: var(--green-dark); color: var(--gold);
    border: none; cursor: pointer;
    font-size: 0.9rem; letter-spacing: 3px;
    font-family: inherit; transition: all 0.3s;
  }

  .btn-save:hover { background: var(--gold); color: var(--green-dark); }

  .btn-cancel {
    padding: 14px 24px;
    border: 1px solid #ddd; background: transparent;
    color: var(--text-mid); cursor: pointer;
    font-size: 0.9rem; letter-spacing: 2px;
    font-family: inherit; transition: all 0.3s;
  }

  .btn-cancel:hover { border-color: var(--text-mid); }

  .toast {
    position: fixed; top: 80px; right: 24px;
    padding: 14px 24px;
    background: var(--green-dark); color: var(--gold);
    font-size: 0.85rem; letter-spacing: 1px;
    z-index: 300; display: none;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }
</style>
</head>
<body>

<!-- 登录页 -->
<div class="login-page" id="loginPage">
  <div class="login-box">
    <div class="login-logo">一品翠坊</div>
    <div class="login-sub">ADMIN · 后台管理系统</div>
    <div class="form-group">
      <label class="form-label">用户名</label>
      <input class="form-input" type="text" id="loginUsername" placeholder="请输入用户名" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div class="form-group">
      <label class="form-label">密码</label>
      <input class="form-input" type="password" id="loginPassword" placeholder="请输入密码" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn-login" onclick="login()">登 录</button>
    <div class="login-error" id="loginError">用户名或密码错误</div>
  </div>
</div>

<!-- 后台主界面 -->
<div class="admin-page" id="adminPage">
  <header class="admin-header">
    <div class="admin-logo">
      一品翠坊
      <span>ADMIN PANEL</span>
    </div>
    <button class="btn-logout" onclick="logout()">退出登录</button>
  </header>

  <main class="admin-main">
    <div class="toolbar">
      <div class="toolbar-title">商品管理</div>
      <button class="btn-add" onclick="openModal()">+ 新增商品</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>图片</th>
            <th>商品名称</th>
            <th>分类</th>
            <th>价格</th>
            <th>库存</th>
            <th>状态</th>
            <th>操作</th>
          </tr>
        </thead>
        <tbody id="productTable">
          <tr><td colspan="7" style="text-align:center;padding:40px;color:#999">加载中...</td></tr>
        </tbody>
      </table>
    </div>
  </main>
</div>

<!-- 新增/编辑弹窗 -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title" id="modalTitle">新增商品</div>
    <form id="productForm">
      <input type="hidden" id="editId">
      <div class="form-group">
        <label class="form-label">商品名称 *</label>
        <input class="form-input" type="text" id="fieldName" placeholder="如：帝王绿翡翠手镯">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">分类 *</label>
          <select class="form-select" id="fieldCategory">
            <option value="">请选择</option>
            <option value="gold">黄金系列</option>
            <option value="silver">白银系列</option>
            <option value="jade">翡翠玉石</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">价格 (元) *</label>
          <input class="form-input" type="number" id="fieldPrice" placeholder="如：38000">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">库存数量</label>
        <input class="form-input" type="number" id="fieldStock" placeholder="默认 1" value="1">
      </div>
      <div class="form-group">
        <label class="form-label">商品描述</label>
        <textarea class="form-textarea" id="fieldDesc" placeholder="如：A货翡翠，冰种，附鉴定证书"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">商品图片</label>
        <div class="img-preview" id="imgPreview" onclick="document.getElementById('fieldImage').click()">
          <div class="img-preview-text">点击上传图片<br><small>支持 jpg、png、webp，最大 5MB</small></div>
        </div>
        <input type="file" id="fieldImage" accept=".jpg,.jpeg,.png,.webp" style="display:none" onchange="previewImage(this)">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-save" onclick="saveProduct()">保 存</button>
        <button type="button" class="btn-cancel" onclick="closeModal()">取 消</button>
      </div>
    </form>
  </div>
</div>

<!-- 提示 Toast -->
<div class="toast" id="toast"></div>

<script src="../js/admin.js"></script>
</body>
</html>
