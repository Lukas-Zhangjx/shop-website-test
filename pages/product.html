<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>商品详情 · 一品翠坊</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  .detail-wrap {
    margin-top: 70px;
    padding: 80px 60px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .breadcrumb {
    font-size: 0.8rem;
    color: var(--text-mid);
    letter-spacing: 1px;
    margin-bottom: 40px;
  }

  .breadcrumb a { color: var(--gold); text-decoration: none; }
  .breadcrumb a:hover { text-decoration: underline; }

  .detail-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
  }

  .detail-img {
    width: 100%;
    aspect-ratio: 1;
    background: var(--cream-dark);
    position: relative;
    overflow: hidden;
  }

  .detail-img img { width: 100%; height: 100%; object-fit: cover; }

  .detail-img-placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 6rem; opacity: 0.2;
  }

  .detail-info { padding-top: 16px; }

  .detail-category {
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: var(--gold);
    margin-bottom: 16px;
    display: block;
  }

  .detail-name {
    font-size: 2rem;
    font-weight: normal;
    letter-spacing: 4px;
    color: var(--green-dark);
    margin-bottom: 24px;
    line-height: 1.4;
  }

  .detail-divider {
    width: 40px; height: 1px;
    background: var(--gold);
    margin-bottom: 24px;
  }

  .detail-price {
    font-size: 2.2rem;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .detail-price-note {
    font-size: 0.8rem;
    color: var(--text-mid);
    letter-spacing: 1px;
    margin-bottom: 32px;
  }

  .detail-desc {
    font-size: 0.9rem;
    line-height: 2;
    color: var(--text-mid);
    letter-spacing: 1px;
    margin-bottom: 40px;
    padding: 24px;
    border: 1px solid rgba(201,168,76,0.2);
    background: rgba(201,168,76,0.03);
  }

  .detail-meta {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 40px;
  }

  .detail-meta-item {
    display: flex;
    font-size: 0.85rem;
    letter-spacing: 1px;
  }

  .detail-meta-label {
    color: var(--text-mid);
    width: 80px;
    flex-shrink: 0;
  }

  .detail-meta-value { color: var(--green-dark); }

  .detail-actions { display: flex; gap: 16px; }

  .btn-enquiry {
    flex: 1;
    padding: 16px;
    background: var(--green-dark);
    color: var(--gold);
    border: none;
    font-size: 1rem;
    letter-spacing: 4px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
    text-decoration: none;
    text-align: center;
    display: block;
  }

  .btn-enquiry:hover { background: var(--gold); color: var(--green-dark); }

  .btn-back {
    padding: 16px 24px;
    border: 1px solid var(--green-dark);
    color: var(--green-dark);
    background: transparent;
    font-size: 0.9rem;
    letter-spacing: 2px;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.3s;
    text-decoration: none;
    display: flex;
    align-items: center;
  }

  .btn-back:hover { background: var(--green-dark); color: var(--cream); }

  @media (max-width: 768px) {
    .detail-wrap { padding: 80px 24px 40px; }
    .detail-grid { grid-template-columns: 1fr; gap: 32px; }
  }
</style>
</head>
<body>

<!-- 导航 -->
<nav>
  <a href="../index.html" class="logo">
    一品翠坊
    <span>YIPIN CUIFANG · EST. 2008</span>
  </a>
  <ul>
    <li><a href="../index.html?category=gold" data-i18n="nav.gold">黄金系列</a></li>
    <li><a href="../index.html?category=silver" data-i18n="nav.silver">白银系列</a></li>
    <li><a href="../index.html?category=jade" data-i18n="nav.jade">翡翠玉石</a></li>
    <li><a href="../index.html#story" data-i18n="nav.about">关于我们</a></li>
  </ul>
  <div style="display:flex;align-items:center;gap:12px;">
    <button id="langToggle" class="lang-toggle" onclick="toggleLang()">EN</button>
    <a href="tel:13800000000" class="nav-contact" data-i18n="nav.contact">联系我们</a>
  </div>
</nav>

<div class="detail-wrap" style="margin-top: 70px; padding-top: 40px;">
  <!-- 面包屑 -->
  <div class="breadcrumb" id="breadcrumb">
    <a href="../index.html" id="breadcrumbHome">首页</a> /
    <span id="breadcrumbCategory">商品</span> /
    <span id="breadcrumbName">加载中...</span>
  </div>

  <!-- 详情内容 -->
  <div id="detailContent">
    <div class="loading">加载中...</div>
  </div>
</div>

<!-- 底部 -->
<footer>
  <span class="footer-logo">一品翠坊</span>
  <div class="footer-info">
    <div class="footer-info-item">
      <span class="footer-info-label" data-i18n="footer.address.label">地址</span>
      <span data-i18n="footer.address">珠宝街88号一品翠坊旗舰店</span>
    </div>
    <div class="footer-info-item">
      <span class="footer-info-label" data-i18n="footer.phone.label">电话</span>
      <span>138-0000-0000</span>
    </div>
    <div class="footer-info-item">
      <span class="footer-info-label" data-i18n="footer.hours.label">营业时间</span>
      <span data-i18n="footer.hours">每日 09:00 — 20:00</span>
    </div>
  </div>
  <div class="footer-divider"></div>
  <div class="footer-copy" data-i18n="footer.copy">© 2024 一品翠坊 · 版权所有</div>
</footer>

<!-- AI客服 -->
<button class="ai-btn" onclick="toggleChat()">💬</button>
<div class="ai-chat" id="aiChat">
  <div class="ai-chat-header">
    <div class="ai-avatar">✦</div>
    <div>
      <div class="ai-name" data-i18n="chat.name">翠坊智能客服</div>
      <div class="ai-status" data-i18n="chat.status">在线 · 随时为您服务</div>
    </div>
  </div>
  <div class="ai-messages" id="aiMessages">
    <div class="msg msg-ai" data-i18n="chat.greeting">您好！欢迎光临一品翠坊 ✨<br>有任何问题随时告诉我！</div>
  </div>
  <div class="ai-input-area">
    <input class="ai-input" id="aiInput" data-i18n-ph="chat.placeholder" placeholder="输入您的问题..." onkeydown="if(event.key==='Enter')sendMsg()">
    <button class="ai-send" onclick="sendMsg()" data-i18n="chat.send">发送</button>
  </div>
</div>

<script src="../js/i18n.js"></script>
<script>
  const API_BASE = 'https://shop-website-test.onrender.com/api';

  function getCategoryMap() {
    return {
      gold:   { name: t('category.gold'),   icon: '✦' },
      silver: { name: t('category.silver'), icon: '◈' },
      jade:   { name: t('category.jade'),   icon: '❋' },
    };
  }

  async function loadProduct() {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) { window.location.href = '../index.html'; return; }

    document.getElementById('detailContent').innerHTML =
      `<div class="loading">${t('detail.loading')}</div>`;

    try {
      const res = await fetch(`${API_BASE}/products/${id}`);
      if (!res.ok) throw new Error('not found');
      const product = await res.json();
      renderProduct(product);
    } catch (err) {
      document.getElementById('detailContent').innerHTML =
        `<div class="empty">${t('detail.not.found')}</div>`;
    }
  }

  function renderProduct(product) {
    const CATEGORY_MAP = getCategoryMap();
    const category = CATEGORY_MAP[product.category] || { name: product.category, icon: '✦' };
    const imageHtml = product.image_path
      ? `<img src="${API_BASE.replace('/api', '')}${product.image_path}" alt="${product.name}">`
      : `<div class="detail-img-placeholder">${category.icon}</div>`;

    document.getElementById('breadcrumbHome').textContent = t('detail.home');
    document.getElementById('breadcrumbCategory').textContent = category.name;
    document.getElementById('breadcrumbName').textContent = product.name;
    document.title = `${product.name} · 一品翠坊`;

    const stockText = product.stock > 0
      ? `${product.stock} ${t('detail.stock.unit')}`
      : t('detail.stock.out');

    document.getElementById('detailContent').innerHTML = `
      <div class="detail-grid">
        <div class="detail-img">${imageHtml}</div>
        <div class="detail-info">
          <span class="detail-category">${category.name}</span>
          <h1 class="detail-name">${product.name}</h1>
          <div class="detail-divider"></div>
          <div class="detail-price">¥ ${Number(product.price).toLocaleString()}</div>
          <div class="detail-price-note">${t('detail.price.note')}</div>
          <div class="detail-desc">${product.description || t('detail.no.desc')}</div>
          <div class="detail-meta">
            <div class="detail-meta-item">
              <span class="detail-meta-label">${t('detail.cat.label')}</span>
              <span class="detail-meta-value">${category.name}</span>
            </div>
            <div class="detail-meta-item">
              <span class="detail-meta-label">${t('detail.stock.label')}</span>
              <span class="detail-meta-value">${stockText}</span>
            </div>
          </div>
          <div class="detail-actions">
            <a href="tel:13800000000" class="btn-enquiry">${t('detail.enquiry')}</a>
            <a href="../index.html" class="btn-back">${t('detail.back')}</a>
          </div>
        </div>
      </div>
    `;
  }

  // 语言切换后重新渲染
  window.onLangChange = function () {
    loadProduct();
  };

  // AI 客服
  function toggleChat() { document.getElementById('aiChat').classList.toggle('open'); }

  function appendMsg(text, type, id = null) {
    const messages = document.getElementById('aiMessages');
    const div = document.createElement('div');
    div.className = `msg msg-${type}`;
    div.textContent = text;
    if (id) div.id = id;
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
  }

  async function sendMsg() {
    const input = document.getElementById('aiInput');
    const text = input.value.trim();
    if (!text) return;

    appendMsg(text, 'user');
    input.value = '';

    const typingId = 'typing-' + Date.now();
    appendMsg('...', 'ai', typingId);

    try {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });
      const data = await res.json();
      const typingEl = document.getElementById(typingId);
      if (typingEl) typingEl.remove();
      appendMsg(data.reply, 'ai');
    } catch (err) {
      const typingEl = document.getElementById(typingId);
      if (typingEl) typingEl.remove();
      appendMsg(t('chat.error'), 'ai');
    }
  }

  document.addEventListener('DOMContentLoaded', () => {
    applyI18n();
    loadProduct();
  });
</script>
</body>
</html>
